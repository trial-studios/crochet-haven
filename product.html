<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product | Crochet Haven</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:'Inter',sans-serif;
background:#F8F1E9;
margin:0;
padding:40px;
}

/* Container */

.product-container{
max-width:1200px;
margin:auto;

background:white;

border-radius:20px;

padding:40px;

box-shadow:0 20px 60px rgba(0,0,0,0.1);

display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
}

/* Image section */

.product-gallery{
display:flex;
flex-direction:column;
gap:15px;
}

.main-image{

width:100%;
height:420px;

background:#fff7f0;

border-radius:15px;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;
}

.main-image img{
width:100%;
height:100%;
object-fit:cover;
}

.thumbnail-row{
display:flex;
gap:10px;
}

.thumbnail{
width:80px;
height:80px;

border-radius:10px;

cursor:pointer;

overflow:hidden;

border:2px solid transparent;
}

.thumbnail img{
width:100%;
height:100%;
object-fit:cover;
}

.thumbnail:hover{
border-color:#D2691E;
}

/* Product info */

.product-info h1{
font-family:'Playfair Display',serif;
font-size:38px;
color:#8B4513;
margin-bottom:10px;
}

.price{
font-size:30px;
font-weight:600;
color:#D2691E;
margin-bottom:15px;
}

.rating{
color:#FF8C00;
margin-bottom:20px;
}

.description{
color:#5a4634;
line-height:1.6;
margin-bottom:30px;
}

/* Buttons */

.buy-btn{

background:linear-gradient(135deg,#D2691E,#FF8C00);

border:none;

color:white;

padding:14px 35px;

font-size:16px;

border-radius:50px;

cursor:pointer;

transition:0.3s;

box-shadow:0 6px 20px rgba(210,105,30,0.3);
}

.buy-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(210,105,30,0.4);
}

/* Back button */

.back-link{
display:inline-block;
margin-bottom:25px;
color:#8B4513;
text-decoration:none;
font-weight:500;
}

.back-link:hover{
text-decoration:underline;
}

@media(max-width:900px){

.product-container{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<a href="Crochet_Home.html" class="back-link">← Back to Shop</a>

<div class="product-container">

<div class="product-gallery">

<div class="main-image">
<img id="mainImage" src="https://images.unsplash.com/photo-1601924582975-7e9c7f7d34ab">
</div>

<div class="thumbnail-row">

<div class="thumbnail">
<img src="https://images.unsplash.com/photo-1601924582975-7e9c7f7d34ab">
</div>

<div class="thumbnail">
<img src="https://images.unsplash.com/photo-1585386959984-a4155223162b">
</div>

<div class="thumbnail">
<img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">
</div>

</div>

</div>

<div class="product-info">

<h1>Amour Heart Blanket</h1>

<div class="price">$89</div>

<div class="rating">
<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
(127 Reviews)
</div>

<p class="description">

A beautifully handcrafted crochet blanket made with soft premium yarn.
Each stitch is carefully woven to provide warmth, elegance, and comfort.
Perfect for cozy evenings, thoughtful gifts, or decorating your home
with handmade charm.

</p>

<button class="buy-btn">Add to Cart</button>

</div>

</div>

<script>

const thumbnails = document.querySelectorAll(".thumbnail img");
const mainImage = document.getElementById("mainImage");

thumbnails.forEach(img=>{
img.addEventListener("click",()=>{
mainImage.src = img.src;
});
});

</script>

</body>
</html>
