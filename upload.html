<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Submission | Crochet Haven</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#F8F1E9;
padding:60px 20px;
}

/* Page title */

.page-title{
font-family:'Playfair Display',serif;
font-size:48px;
text-align:center;
color:#8B4513;
margin-bottom:40px;
}

/* Upload container */

.upload-container{
max-width:900px;
margin:auto;
background:white;
padding:40px;

border-radius:20px;

box-shadow:0 20px 60px rgba(0,0,0,0.1);
}

/* Input groups */

.form-group{
margin-bottom:25px;
}

label{
display:block;
margin-bottom:8px;
font-weight:500;
color:#5a4634;
}

input, textarea, select{

width:100%;
padding:14px;

border-radius:10px;
border:1px solid #ddd;

font-size:15px;
}

/* Focus effect */

input:focus, textarea:focus, select:focus{

outline:none;

border-color:#D2691E;

box-shadow:0 0 0 3px rgba(210,105,30,0.15);
}

/* Image Upload Box */

.upload-box{

border:2px dashed #D2691E;

padding:40px;

text-align:center;

border-radius:15px;

cursor:pointer;

transition:0.3s;
}

.upload-box:hover{

background:#fff7f0;
}

.preview-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:12px;
margin-top:15px;
}

.preview-grid img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.preview-item{
position:relative;
}

.preview-item img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* Remove button */

.remove-img{
position:absolute;
top:6px;
right:6px;

width:22px;
height:22px;

border:none;
border-radius:50%;

background:#b91c1c;
color:white;

font-size:14px;
cursor:pointer;

display:flex;
align-items:center;
justify-content:center;

line-height:1;
}

.remove-img:hover{
background:#7f1d1d;
}

.error-message{
margin-top:12px;
padding:10px;

border-radius:8px;

background:#ffe5e5;
color:#b91c1c;

font-size:14px;
display:none;
}
/* Submit Button */

.submit-btn{

background:linear-gradient(135deg,#D2691E,#FF8C00);

color:white;

padding:14px 30px;

border:none;

border-radius:50px;

font-size:16px;

cursor:pointer;

margin-top:20px;

transition:0.3s;
}

.submit-btn:hover{

transform:translateY(-2px);

box-shadow:0 8px 20px rgba(210,105,30,0.4);
}

</style>
</head>

<body>

<h1 class="page-title">Upload Your Crochet Creation</h1>

<div class="upload-container">

<form id="productForm">

<div class="form-group">

<label>Product Name</label>
<input type="text" required>

</div>

<div class="form-group">

<label>Description</label>
<textarea rows="4"></textarea>

</div>

<div class="form-group">

<label>Price ($)</label>
<input type="number">

</div>

<div class="form-group">

<label>Category</label>

<select>

<option>Blankets</option>
<option>Scarves</option>
<option>Baby Items</option>
<option>Accessories</option>

</select>

</div>

<div class="form-group">

<label>Upload Images</label>

<div class="upload-box" id="uploadBox">
Click or Drag images here
<input type="file" id="imageInput" multiple hidden accept="image/*">
</div>

<div class="preview-grid" id="previewGrid"></div>
<div class="error-message" id="uploadError"></div>

</div>

<button class="submit-btn">

Submit Product

</button>

</form>

</div>

<script>
const uploadBox = document.getElementById("uploadBox");
const imageInput = document.getElementById("imageInput");
const previewGrid = document.getElementById("previewGrid");
const errorBox = document.getElementById("uploadError");

uploadBox.addEventListener("click", () => {
imageInput.click();
});

imageInput.addEventListener("change", () => {

const files = imageInput.files;

for(let i = 0; i < files.length; i++){

const file = files[i];

if(!file.type.startsWith("image/")){

errorBox.style.display = "block";
errorBox.textContent = "Only image files are allowed (.png, .jpg, .jpeg, etc).";

continue;

}

errorBox.style.display = "none";

const reader = new FileReader();

reader.onload = function(e){

const wrapper = document.createElement("div");
wrapper.classList.add("preview-item");

const img = document.createElement("img");
img.src = e.target.result;

const removeBtn = document.createElement("button");
removeBtn.classList.add("remove-img");
removeBtn.innerHTML = "✕";

removeBtn.addEventListener("click", () => {
wrapper.remove();
});

wrapper.appendChild(img);
wrapper.appendChild(removeBtn);

previewGrid.appendChild(wrapper);

}

reader.readAsDataURL(file);

}

});
</script>
</body>
</html>
